services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: telecom_db
      POSTGRES_USER: telecom
      POSTGRES_PASSWORD: telecom
    ports:
      - "5432:5432"
    volumes:
      - telecom_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telecom -d telecom_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      VITE_API_PROXY_TARGET: http://backend:5000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  telecom_db_data:
  frontend_node_modules:
